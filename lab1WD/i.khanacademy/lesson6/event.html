<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Event Invite</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .event-invite {
            width: 80%;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background-color: #ffffff;
            border-radius: 10px;
        }

        .event-title {
            text-align: center;
            font-size: 36px;
            color: #4CAF50;
            margin-bottom: 20px;
        }

        .event-details {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .date-time,
        .location {
            font-weight: bold;
            margin-bottom: 10px;
        }

        .description {
            font-style: italic;
        }

        .rsvp {
            text-align: center;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <div class="event-invite">
        <h1 class="event-title">Hackaton</h1>

        <div class="event-details">
            <p class="date-time">Date: 05/15/2025 | Time: 6:00 PM</p>
            <p class="location">Location: 123 Tole Bi Almaty, ALA</p>
            <p class="description">Join us for an unforgettable competetion!</p>
        </div>

        <div class="rsvp">
            <button>RSVP Now</button>
        </div>
    </div>
</body>

</html>
